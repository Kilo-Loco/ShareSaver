name: ShareSaver
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  ShareSaver:
    type: application
    platform: iOS
    sources:
      - path: ShareSaver
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ShareSaver
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: ShareSaver/ShareSaver.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    dependencies:
      - target: SaveExtension

  SaveExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SaveExtension
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: ShareSaver/ShareSaver.xcdatamodeld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ShareSaver.SaveExtension
        INFOPLIST_FILE: SaveExtension/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: SaveExtension/SaveExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
